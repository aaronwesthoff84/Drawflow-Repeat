kind = "web"
previewPath = "/"
title = "DrawFlow"
version = "1.0.0"
id = "artifacts/drawflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24797

[services.development]
run = "pnpm --filter @workspace/drawflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/drawflow", "run", "build" ]
publicDir = "artifacts/drawflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24797"
BASE_PATH = "/"
